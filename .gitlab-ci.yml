default:
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.32.1 --activate
    - pnpm install --frozen-lockfile

stages:
  - lint
  - typecheck
  - test
  - quality
  - security
  - sbom
  - build
  - release

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PNPM_CACHE_FOLDER: "$CI_PROJECT_DIR/.pnpm-store"

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store
    - node_modules

# ============ LINT ============
lint:
  stage: lint
  script:
    - pnpm lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

commitlint:
  stage: lint
  script:
    - pnpm exec commitlint --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --to HEAD --verbose
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============ TYPECHECK ============
typecheck:
  stage: typecheck
  script:
    - pnpm typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============ TEST ============
test:
  stage: test
  script:
    - pnpm test:coverage
  coverage: '/Statements\s*:\s*([0-9.]+)/'
  artifacts:
    when: always
    reports:
      junit: coverage/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============ QUALITY ============
knip:
  stage: quality
  script:
    - pnpm knip
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

jscpd:
  stage: quality
  script:
    - pnpm jscpd
  artifacts:
    when: always
    paths:
      - reports/jscpd
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

size-limit:
  stage: quality
  script:
    - pnpm build
    - pnpm size
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

reuse-compliance:
  stage: quality
  image: fsfe/reuse:latest
  before_script: []
  script:
    - reuse lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============ SECURITY ============
audit:
  stage: security
  script:
    - pnpm audit --prod --audit-level=moderate
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

license-check:
  stage: security
  script:
    - pnpm license-check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --redact --verbose --config .gitleaks.toml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

# ============ SBOM ============
sbom:
  stage: sbom
  script:
    - pnpm sbom
  artifacts:
    paths:
      - sbom.json
    expire_in: 90 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============ BUILD ============
build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - packages/*/dist
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============ RELEASE ============
release:
  stage: release
  script:
    - pnpm build
    - pnpm release
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ============ NIGHTLY (mutation testing) ============
mutation-testing:
  stage: quality
  script:
    - pnpm test:mutation
  artifacts:
    paths:
      - reports/mutation
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
