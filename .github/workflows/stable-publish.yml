name: Stable Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: stable-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-stable:
    name: Publish @focus-mcp/* packages with @latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upgrade npm for OIDC Trusted Publishing support
        run: npm install -g npm@latest
      - name: Publish all packages with latest tag
        run: |
          for dir in packages/*/; do
            if [ -f "${dir}package.json" ]; then
              PRIVATE=$(node -e "console.log(require('./${dir}package.json').private)")
              if [ "$PRIVATE" != "true" ]; then
                NAME=$(node -e "console.log(require('./${dir}package.json').name)")
                VERSION=$(node -e "console.log(require('./${dir}package.json').version)")
                echo "Publishing ${NAME}@${VERSION}..."
                cd "$dir"
                npm publish --access public 2>&1 || echo "  → skipped (already published?)"
                cd ../..
              fi
            fi
          done
        id: publish
        # NODE_AUTH_TOKEN fallback: kept for rollback if Trusted Publisher not yet configured on npmjs.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./packages/core/package.json').version)")
          TAG="v${VERSION}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "TAG_CREATED=true" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && env.TAG_CREATED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if echo "${TAG}" | grep -q '-'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          NOTES=$(awk "/^## \[${TAG#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${NOTES}" \
            ${PRERELEASE_FLAG}
