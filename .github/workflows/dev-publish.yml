name: Dev Publish

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: dev-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish @focus-mcp/* dev packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm install --frozen-lockfile
      - name: Apply changeset snapshot versions
        run: |
          # Produces versions like 1.2.0-dev-20260428-abc1234 from pending changesets.
          # Falls back gracefully when no changesets are pending (no-op).
          pnpm changeset version --snapshot dev || true
      - run: pnpm build
      - name: Publish all packages with dev tag
        run: pnpm changeset publish --no-git-tag --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
